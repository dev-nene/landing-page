<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

    <link rel="stylesheet" href="styles.css" />
    <title>Landing Page</title>

  <body>
    <header class="header">
      <div class="header__container">

      <h3 class="header__logo">Header Logo</h3>

      <nav class="header__nav">
        <div class="header__links">
          <a href="#" class="header__link">link one</a>
          <a href="#" class="header__link">link two</a>
          <a href="#" class="header__link">link three</a>
        </div>
      </nav>

    <div class="hero">

        <h1 class="hero__title">This website is awesome</h1>
        <p class="hero__subtext">This website has some subtext that goes here under the main title. It's a smaller font and the color is lower contrast</p>
        <button class="hero__button">Sign Up</button>
      </div>
      <div class="hero__image__wrapper">
        <img class="hero__image" src="./images/hero.png" width="687px" height="1031px" alt="image of girl coding on laptop">

      </div>
      
    </div>
